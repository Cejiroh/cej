<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quality Checker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1e1e1e;
    --surface: #252526;
    --surface2: #2d2d30;
    --border: #3c3c3c;
    --border2: #2f2f2f;
    --blue: #007acc;
    --blue-dim: #006ab1;
    --red: #f44747;
    --amber: #ce9178;
    --green: #6a9955;
    --purple: #c586c0;
    --text: #d4d4d4;
    --text-dim: #9e9e9e;
    --text-faint: #6a6a6a;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }
  body { min-height: 100vh; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px; background: var(--blue);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-text span { color: var(--blue); }

  /* LAYOUT */
  .main {
    margin: 20px auto;
    padding: 20px;
    width: calc(100% - 40px);
  }
  @media (max-width: 640px) {
    .main { padding: 12px; width: calc(100% - 24px); }
  }

  /* UPLOAD ZONE */
  #upload-zone {
    border: 2px dashed var(--border2);
    border-radius: 16px;
    padding: 64px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative;
  }
  #upload-zone:hover, #upload-zone.dragover {
    border-color: var(--blue);
    background: rgba(0,122,204,0.04);
  }
  #upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 1; }
  .upload-icon, .upload-title, .upload-sub, .upload-formats, .fmt-tag { pointer-events: none; }
  .upload-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.7; }
  .upload-title { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  .upload-sub { color: var(--text-dim); font-size: 14px; }
  .upload-formats {
    margin-top: 20px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
  }
  .fmt-tag {
    font-family: var(--mono); font-size: 11px; padding: 4px 10px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 20px; color: var(--blue);
  }

  /* PROGRESS */
  #progress-zone { display: none; text-align: center; padding: 48px; }
  .spinner {
    width: 48px; height: 48px; border: 3px solid var(--border2);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-text { color: var(--text-dim); font-size: 15px; }

  /* RESULTS */
  #results-zone { display: none; }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px; margin-bottom: 28px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 22px;
    cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    user-select: none;
  }
  .card:hover { border-color: var(--border2); box-shadow: 0 2px 12px rgba(0,0,0,0.12); transform: translateY(-1px); }
  .card.active-filter { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(0,122,204,0.25); }
  .card.active-filter-red { border-color: var(--red); box-shadow: 0 0 0 2px rgba(244,63,94,0.25); }
  .card.active-filter-amber { border-color: var(--amber); box-shadow: 0 0 0 2px rgba(245,158,11,0.25); }
  .card.active-filter-green { border-color: var(--green); box-shadow: 0 0 0 2px rgba(34,197,94,0.25); }
  .card-label { font-size: 12px; color: var(--text-dim); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
  .card-value { font-size: 32px; font-weight: 700; font-family: var(--mono); line-height: 1; }
  .card-value.red { color: var(--red); }
  .card-value.amber { color: var(--amber); }
  .card-value.green { color: var(--green); }
  .card-value.blue { color: var(--blue); }
  .card-sub { font-size: 12px; color: var(--text-faint); margin-top: 6px; }

  /* FILE INFO */
  .file-info {
    display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
    padding: 12px 18px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px;
  }
  .file-info-icon { font-size: 20px; }
  .file-info-name { font-weight: 600; font-size: 15px; }
  .file-info-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .reset-btn {
    margin-left: auto; padding: 7px 16px; background: transparent;
    border: 1px solid var(--border2); border-radius: 8px; color: var(--text-dim);
    cursor: pointer; font-family: var(--sans); font-size: 13px; transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  /* CONTROLS */
  .controls {
    display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
  }
  .search-input {
    flex: 1; min-width: 220px; padding: 9px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 13px;
    outline: none; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--blue); }
  .search-input::placeholder { color: var(--text-faint); }
  select.filter-select {
    padding: 9px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 13px;
    outline: none; cursor: pointer; min-width: 160px;
  }
  select.filter-select:focus { border-color: var(--blue); }
  .export-btn {
    padding: 9px 20px; background: var(--blue-dim); border: 1px solid var(--blue);
    border-radius: 8px; color: white; font-family: var(--sans); font-size: 13px;
    font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .export-btn:hover { background: var(--blue); }
  .count-label { color: var(--text-dim); font-size: 13px; white-space: nowrap; padding: 0 4px; }

  /* TABLE */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th {
    text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-dim);
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  td {
    padding: 11px 16px; border-bottom: 1px solid var(--border);
    font-size: 13px; vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .col-row { font-family: var(--mono); font-size: 12px; color: var(--text-dim); font-weight: 500; }
  .col-rule { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .col-col { font-family: var(--mono); font-size: 11px; color: var(--blue); }
  .col-msg { font-size: 13px; line-height: 1.5; }
  .col-val {
    font-family: var(--mono); font-size: 11px; color: var(--text-faint);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .sev-error {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600; padding: 3px 8px;
    background: rgba(244,63,94,0.12); color: var(--red); border-radius: 4px;
    border: 1px solid rgba(244,63,94,0.25);
  }
  .sev-warning {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600; padding: 3px 8px;
    background: rgba(245,158,11,0.12); color: var(--amber); border-radius: 4px;
    border: 1px solid rgba(245,158,11,0.25);
  }

  .q-badge {
    display: inline-flex; align-items: center;
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    padding: 3px 9px; background: rgba(0,122,204,0.13); color: var(--blue);
    border-radius: 5px; border: 1px solid rgba(0,122,204,0.3);
    white-space: nowrap;
  }

  .col-remarks {
    font-size: 12px; color: var(--amber); font-style: italic;
    word-break: break-word;
  }

  .col-checkoder {
    font-size: 12px; color: var(--text-dim);
    word-break: break-word; white-space: nowrap;
  }

  /* PAGINATION */
  .pagination {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-top: 1px solid var(--border);
    background: var(--surface2); font-size: 13px; color: var(--text-dim);
  }
  .page-btns { display: flex; gap: 6px; }
  .page-btn {
    padding: 5px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-dim); cursor: pointer;
    font-family: var(--sans); font-size: 12px; transition: all 0.15s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--text); }
  .page-btn.active { background: var(--blue); border-color: var(--blue); color: white; }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 56px 32px; color: var(--text-dim);
  }
  .empty-icon { font-size: 42px; margin-bottom: 14px; }
  .empty-title { font-size: 17px; font-weight: 600; color: var(--green); margin-bottom: 8px; }

  /* RULE ACCORDION */
  .rules-section { margin-top: 32px; }
  .section-title {
    font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text);
    display: flex; align-items: center; gap: 10px;
  }
  .section-divider { flex: 1; height: 1px; background: var(--border); }
  .rules-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }
  .rule-chip {
    padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; display: flex; align-items: flex-start; gap: 10px;
  }
  .rule-num {
    font-family: var(--mono); font-size: 11px; color: var(--blue);
    background: rgba(59,130,246,0.1); border-radius: 4px; padding: 2px 6px;
    white-space: nowrap; margin-top: 1px;
  }
  .rule-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-text">Quality <span>Checker</span></div>
  </div>
</div>

<div class="main">
  <!-- UPLOAD -->
  <div id="upload-zone">
    <input type="file" id="file-input" accept=".csv,.xlsx,.xls" onchange="handleFile(event)">
    <div class="upload-icon">📂</div>
    <div class="upload-title">Drop your data file here</div>
    <div class="upload-sub">Upload a CSV or Excel file to check it against all validation rules</div>
    <div class="upload-formats">
      <span class="fmt-tag">.CSV</span>
      <span class="fmt-tag">.XLSX</span>
      <span class="fmt-tag">.XLS</span>
    </div>
  </div>

  <!-- PROGRESS -->
  <div id="progress-zone">
    <div class="spinner"></div>
    <div class="progress-text" id="progress-text">Parsing file…</div>
  </div>

  <!-- RESULTS -->
  <div id="results-zone">
    <div class="file-info" id="file-info"></div>

    <div class="summary-grid" id="summary-grid"></div>

    <div class="controls">
      <input type="text" class="search-input" id="search-input" placeholder="Search by column, message, or row…" oninput="renderTable()">
      <select class="filter-select" id="rule-filter" onchange="renderTable()">
        <option value="all">Filter</option>
      </select>
      <span class="count-label" id="count-label"></span>
      <button class="export-btn" onclick="exportCSV()">⬇ Export Errors</button>
    </div>

    <div class="table-wrap">
      <table id="error-table">
        <thead>
          <tr>
            <th>Row</th>
            <th>Column(s)</th>
            <th>Q#</th>
            <th>Error Description</th>
            <th>Actual Value</th>
            <th>Remarks</th>
            <th>Checkoder</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div id="empty-state" class="empty-state" style="display:none">
        <div class="empty-icon">✅</div>
        <div class="empty-title">No issues found!</div>
        <div>All rows passed the applied filters.</div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let allErrors = [];
let allGroups = [];      // [{qcn, issues:[...]}]
let filteredGroups = [];
let currentPage = 1;
let activeSevFilter = 'all'; // 'all' | 'error' | 'warning'
const PAGE_SIZE = 25;

// ── HELPERS ────────────────────────────────────────────────────────────────
const isEmpty = v => {
  if (v === null || v === undefined) return true;
  const s = String(v).trim();
  return s === '' || s.toLowerCase() === 'n/a' || s.toLowerCase() === 'null' || s === '#N/A' || s === 'NA';
};
const notEmpty = v => !isEmpty(v);
const isTrue = v => {
  if (v === null || v === undefined) return false;
  const s = String(v).trim().toUpperCase();
  return s === 'TRUE' || s === '1' || s === 'YES';
};
const str = v => isEmpty(v) ? '' : String(v).trim();
const num = v => parseFloat(String(v).replace(/,/g, ''));
const isNum = v => !isNaN(num(v)) && notEmpty(v);
const isInt = v => isNum(v) && Number.isInteger(num(v));
const eq = (a, b) => str(a).toLowerCase() === str(b).toLowerCase();
const inList = (v, list) => list.map(x => x.toLowerCase()).includes(str(v).toLowerCase());

function getCol(row, headers, name, fallbackLetter) {
  const idx = headers.findIndex(h => str(h).toLowerCase() === name.toLowerCase());
  if (idx >= 0) return row[idx];
  if (fallbackLetter) {
    const pos = colToIdx(fallbackLetter);
    return pos < row.length ? row[pos] : undefined;
  }
  return undefined;
}

function colToIdx(col) {
  col = col.toUpperCase();
  let r = 0;
  for (let i = 0; i < col.length; i++) r = r * 26 + (col.charCodeAt(i) - 64);
  return r - 1;
}

function getByLetter(row, letter) {
  const i = colToIdx(letter);
  return i < row.length ? row[i] : undefined;
}

function getByName(row, headers, name) {
  const idx = headers.findIndex(h => str(h).toLowerCase() === name.toLowerCase());
  return idx >= 0 ? row[idx] : undefined;
}

function isTimeVal(v) {
  if (isEmpty(v)) return true; // NULL is ok for time fields
  const s = str(v);
  // Check if it looks like a plain time: HH:MM or HH:MM:SS (allow AM/PM)
  if (/^\d{1,2}:\d{2}(:\d{2})?(\s?(AM|PM))?$/i.test(s)) return true;
  // Accept a time token anywhere inside (e.g., full timestamp strings)
  if (/(\d{1,2}:\d{2}(:\d{2})?)/.test(s)) return true;
  // Excel time fraction (0-1)
  const n = parseFloat(s);
  if (!isNaN(n) && n >= 0 && n < 1) return true;
  // Fallback: try parsing as a Date and accept if the parsed time is non-midnight
  const d = new Date(s);
  if (!isNaN(d)) {
    // If the original string explicitly contained a time token we already returned.
    // Here, accept only if the parsed date has a non-zero time component.
    return d.getHours() !== 0 || d.getMinutes() !== 0 || d.getSeconds() !== 0;
  }
  return false;
}

function isTime090000(v) {
  if (isEmpty(v)) return true; // NULL is ok
  const s = str(v);
  // Extract an H:M[:S] token if present
  const m = s.match(/(\d{1,2}:\d{2}(:\d{2})?)/);
  if (m) {
    const time = m[1];
    if (time.length === 5) return time === '09:00';
    return time === '09:00:00';
  }
  // Fallback: try parsing as a Date and check the time components
  const d = new Date(s);
  if (!isNaN(d)) return d.getHours() === 9 && d.getMinutes() === 0 && d.getSeconds() === 0;
  return false;
}

// ── VALIDATION RULES ───────────────────────────────────────────────────────
function buildErrors(rows, headers) {
  const h = headers.map(x => str(x).toLowerCase());
  const g = (row, name, fb) => getByName(row, h, name) ?? (fb ? getByLetter(row, fb) : undefined);

  // Track seen control numbers for duplicate check
  const seenCtrl = new Map();
  // Track duplicate CAN and phone numbers across rows
  const canDupMap = new Map();
  const phoneDupMap = new Map();

  const errors = [];

  rows.forEach((row, ri) => {
    const ROW = ri + 2; // 1-based, +1 for header

    // Resolve QCN identifier for this row
    const qcnA = g(row,'questionnaire_control_number','A');
    const qcnB = g(row,'q_control_number','B');
    const rowQCN = str(qcnA || qcnB) || `[row ${ROW}]`;

    const extractQLabel = (cols) => {
      const colStr = Array.isArray(cols) ? cols[0] : cols;
      const s = String(colStr).trim();
      // Match q<digits><optional letters> at the start, e.g. q18d, q6, q33
      const m = s.match(/^(q\d+[a-z]*)[_\s]/i);
      if (m) return m[1].toLowerCase(); // e.g. "q18d", "q6", "q33"
      // No leading q# pattern — use the full column name (or first token before space)
      return s.split(/[\s,]/)[0] || s;
    };
    const rowCheckoder = str(getByLetter(row, 'I') || '');
    const add = (ruleId, cols, sev, msg, val, remarks) => {
      const colStr = Array.isArray(cols) ? cols.join(', ') : cols;
      const qLabel = extractQLabel(cols);
      errors.push({ qcn: rowQCN, ruleId, qLabel, cols: colStr, sev, msg, val: val !== undefined ? String(val) : '', remarks: remarks || '', checkoder: rowCheckoder });
    };

    // ── RULE 1: questionnaire_control_number == q_control_number ──
    const qcn = qcnA;
    const qcn2 = qcnB;
    if (notEmpty(qcn) && notEmpty(qcn2) && !eq(qcn, qcn2))
      add(1,'questionnaire_control_number / q_control_number','error',`Control numbers do not match: "${str(qcn)}" ≠ "${str(qcn2)}"`,`${str(qcn)} | ${str(qcn2)}`);

    // ── RULE 2: no duplicate q_control_number ──
    if (notEmpty(qcn2)) {
      const key = str(qcn2).toLowerCase();
      if (seenCtrl.has(key)) add(2,'q_control_number','error',`Duplicate q_control_number: "${str(qcn2)}" (first seen at row ${seenCtrl.get(key)})`,str(qcn2));
      else seenCtrl.set(key, ROW);
    }

    // ── RULE 3: hs_name (col C) == hydraulic_system (col V) ──
    const hsName = getByLetter(row,'C');
    const hydraulicSystem = getByLetter(row,'V');
    if (notEmpty(hsName) && notEmpty(hydraulicSystem) && !eq(hsName, hydraulicSystem))
      add(3,'hs_name (C) / hydraulic_system (V)','error',`hs_name "${str(hsName)}" does not match hydraulic_system "${str(hydraulicSystem)}"`,`${str(hsName)} | ${str(hydraulicSystem)}`);

    // ── RULE 4: lgu_name (col G) == lgu_name (col U) ──
    const lguD = getByLetter(row,'G');
    const lguU = getByLetter(row,'U');
    if (notEmpty(lguD) && notEmpty(lguU) && !eq(lguD, lguU))
      add(4,'lgu_name (G) / lgu_name (U)','error',`lgu_name mismatch: col G "${str(lguD)}" ≠ col U "${str(lguU)}"`,`${str(lguD)} | ${str(lguU)}`);

    // ── RULE 5: barangay_name no NULL/NA/Blank ──
    const bgy = g(row,'barangay_name','E');
    if (isEmpty(bgy)) add(5,'barangay_name','error','barangay_name must not be empty/NULL/N/A','[empty]');

    // ── RULE 6: q2_gender no missing ──
    const gender = g(row,'q2_gender','Z');
    if (isEmpty(gender)) add(6,'q2_gender','error','q2_gender must not be missing','[empty]');

    // ── RULE 7: q2_gender dropdown choices ──
    const genderChoices = ['male','female','lalaki','babae'];
    if (notEmpty(gender) && !inList(gender, genderChoices))
      add(7,'q2_gender','error',`q2_gender has invalid value. Expected: Male/Female/Lalaki/Babae`,str(gender));

    // ── RULE 8: q5_rate_code dropdown ──
    const rateCode = g(row,'q5_rate_code','AG');
    const validRateCodes = ['residential','commercial','semi-business','government','bulk','semi business'];
    if (notEmpty(rateCode) && !inList(rateCode, validRateCodes))
      add(8,'q5_rate_code','warning',`q5_rate_code value may be invalid (not a standard rate code): "${str(rateCode)}"`,str(rateCode));

    // ── RULES 9-10: Residential must have NULL installation_type ──
    const instType1 = g(row,'q5_rate_code_installation_type','AH');
    const instType2 = getByLetter(row,'AI');
    if (notEmpty(rateCode) && str(rateCode).toLowerCase().includes('residential')) {
      if (notEmpty(instType1))
        add(9,'q5_rate_code_installation_type (AH)','error','Residential rate code must have NULL q5_rate_code_installation_type (col AH)',str(instType1));
      if (notEmpty(instType2))
        add(10,'q5_rate_code_installation_type (AI)','error','Residential rate code must have NULL q5_rate_code_installation_type (col AI)',str(instType2));
    }

    // ── RULE 11: q6_submeter = Hindi → amounts must be NULL ──

      else if (!inList(hv,['yes','no'])) add(r[0],`q38_appliances_${key}_has_appliance`,'error',`q38_appliances_${key}_has_appliance must be Yes or No`,str(hv));
      const isYes = notEmpty(hv) && str(hv).toLowerCase() === 'yes';
      if (isYes && !isInt(cv)) add(r[1],`q38_appliances_${key}_count`,'error',`q38_appliances_${key}_count must be an integer when has_appliance = Yes`,str(cv));
      if (!isYes && notEmpty(cv)) add(r[1],`q38_appliances_${key}_count`,'error',`q38_appliances_${key}_count must be NULL when has_appliance = No`,str(cv));
    });
    // Warnings: garden count >= 2, swimming pool count >= 1
    const gardenCnt = g(row,'q38_appliances_garden_count') ?? getByLetter(row,'IB');
    if (isInt(gardenCnt) && num(gardenCnt) >= 2)
      add(150,'q38_appliances_garden_count','warning',`q38_appliances_garden_count is ${num(gardenCnt)} — please verify (2 or more gardens)`,str(gardenCnt));
    const poolCnt = g(row,'q38_appliances_swimming_pool_count') ?? getByLetter(row,'IH');
    if (isInt(poolCnt) && num(poolCnt) >= 1)
      add(156,'q38_appliances_swimming_pool_count','warning',`q38_appliances_swimming_pool_count is ${num(poolCnt)} — please verify (swimming pool reported)`,str(poolCnt));

    // Rule 161-163: q38_appliances_other
    const appOtherText = g(row,'q38_appliances_other','IM');
    const appOtherHas = g(row,'q38_appliances_other_has_appliance','IN');
    const appOtherCnt = g(row,'q38_appliances_other_count','IO');
    if (notEmpty(appOtherHas) && str(appOtherHas).toLowerCase() === 'yes' && isEmpty(appOtherText))
      add(161,'q38_appliances_other','error','q38_appliances_other must have a value when has_appliance = Yes','[empty]');
    if (notEmpty(appOtherText) && isEmpty(appOtherHas))
      add(162,'q38_appliances_other_has_appliance','error','q38_appliances_other_has_appliance must be set if other has a response','[empty]');
    const appOthYes = notEmpty(appOtherHas) && str(appOtherHas).toLowerCase() === 'yes';
    if (appOthYes && !isInt(appOtherCnt)) add(163,'q38_appliances_other_count','error','q38_appliances_other_count must be an integer when has_appliance = Yes',str(appOtherCnt));
    if (!appOthYes && notEmpty(appOtherCnt)) add(163,'q38_appliances_other_count','error','q38_appliances_other_count must be NULL when has_appliance ≠ Yes',str(appOtherCnt));
  });

  return errors;
}

// ── FILE HANDLING ──────────────────────────────────────────────────────────
let fileName = '', rowCount = 0;

function triggerUpload() {
  document.getElementById('file-input').click();
}

const uploadZone = document.getElementById('upload-zone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('dragover');
  const files = e.dataTransfer.files;
  if (files.length) processFile(files[0]);
});

function handleFile(e) {
  if (e.target.files.length) processFile(e.target.files[0]);
}

function processFile(file) {
  fileName = file.name;
  uploadZone.style.display = 'none';
  document.getElementById('progress-zone').style.display = 'block';

  const reader = new FileReader();
  reader.onload = e => {
    setTimeout(() => {
      try {
        document.getElementById('progress-text').textContent = 'Parsing spreadsheet…';
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, blankrows: false });

        if (raw.length < 2) throw new Error('File has fewer than 2 rows (no data).');

        const headers = raw[0];
        const rows = raw.slice(1);
        rowCount = rows.length;

        document.getElementById('progress-text').textContent = `Validating ${rowCount.toLocaleString()} rows…`;

        setTimeout(() => {
          allErrors = buildErrors(rows, headers);
          // Group errors by QCN
          const map = new Map();
          allErrors.forEach(e => {
            if (!map.has(e.qcn)) map.set(e.qcn, { qcn: e.qcn, issues: [] });
            map.get(e.qcn).issues.push(e);
          });
          allGroups = [...map.values()];
          populateRuleFilter();
          renderSummary();
          renderTable();
          document.getElementById('progress-zone').style.display = 'none';
          document.getElementById('results-zone').style.display = 'block';
          renderFileInfo();
        }, 50);
      } catch (err) {
        document.getElementById('progress-zone').style.display = 'none';
        uploadZone.style.display = 'block';
        alert('Error processing file: ' + err.message);
      }
    }, 100);
  };
  reader.readAsArrayBuffer(file);
}

function renderFileInfo() {
  const el = document.getElementById('file-info');
  const ext = fileName.split('.').pop().toUpperCase();
  el.innerHTML = `
    <div class="file-info-icon">${ext === 'CSV' ? '📄' : '📊'}</div>
    <div>
      <div class="file-info-name">${fileName}</div>
      <div class="file-info-meta">${rowCount.toLocaleString()} data rows · ${allErrors.length.toLocaleString()} issues found</div>
    </div>
    <button class="reset-btn" onclick="resetTool()">✕ Upload New File</button>
  `;
}

function resetTool() {
  allErrors = []; allGroups = []; filteredGroups = []; currentPage = 1; activeSevFilter = 'all';
  document.getElementById('results-zone').style.display = 'none';
  document.getElementById('upload-zone').style.display = 'block';
  document.getElementById('file-input').value = '';
}

function renderSummary() {
  const totalIssues = allErrors.length;
  const errors = allErrors.filter(e => e.sev === 'error').length;
  const warnings = allErrors.filter(e => e.sev === 'warning').length;
  const qcnsWithErrors = allGroups.filter(g => g.issues.some(i => i.sev === 'error')).length;
  const qcnsWithIssues = allGroups.length;
  const cleanQCNs = rowCount - qcnsWithIssues;

  const cards = [
    { filter: 'all',     label: 'Total Rows',       value: rowCount,        color: 'blue',  sub: 'QCNs checked',    activeClass: 'active-filter' },
    { filter: 'issues',  label: 'QCNs with Issues', value: qcnsWithIssues,  color: 'red',   sub: `of ${rowCount} QCNs`, activeClass: 'active-filter-red' },
    { filter: 'error',   label: 'Total Errors',      value: errors,          color: 'red',   sub: 'must fix',        activeClass: 'active-filter-red' },
    { filter: 'warning', label: 'Total Warnings',    value: warnings,        color: 'amber', sub: 'review needed',   activeClass: 'active-filter-amber' },
    { filter: 'clean',   label: 'Clean QCNs',        value: cleanQCNs,       color: 'green', sub: 'passed all checks', activeClass: 'active-filter-green' },
    { filter: 'all',     label: 'Total Issues',      value: totalIssues,     color: 'amber', sub: 'across all QCNs', activeClass: 'active-filter' },
  ];

  const grid = document.getElementById('summary-grid');
  grid.innerHTML = cards.map((c, i) => `
    <div class="card${activeSevFilter === c.filter && !(c.filter === 'all' && i === 5 && activeSevFilter !== 'all') ? ' ' + c.activeClass : ''}"
         data-filter="${c.filter}" data-index="${i}"
         onclick="setSevFilter('${c.filter}', ${i})">
      <div class="card-label">${c.label}</div>
      <div class="card-value ${c.color}">${c.value.toLocaleString()}</div>
      <div class="card-sub">${c.sub}</div>
    </div>`).join('');
}

function setSevFilter(filter, index) {
  // "Total Rows" (index 0) and "Total Issues" (index 5) both use 'all' — clicking them resets
  const isReset = filter === 'all';
  activeSevFilter = (activeSevFilter === filter && !isReset) ? 'all' : filter;
  renderSummary();
  renderTable();
}

function populateRuleFilter() {
  const qLabels = [...new Set(allErrors.map(e => e.qLabel))].sort((a, b) => {
    // Sort by numeric part first, then letter suffix
    const ma = a.match(/^q(\d+)([a-z]*)$/i);
    const mb = b.match(/^q(\d+)([a-z]*)$/i);
    if (ma && mb) {
      const nd = parseInt(ma[1]) - parseInt(mb[1]);
      if (nd !== 0) return nd;
      return ma[2].localeCompare(mb[2]);
    }
    return a.localeCompare(b);
  });
  const sel = document.getElementById('rule-filter');
  sel.innerHTML = '<option value="all">Filter</option>';
  qLabels.forEach(label => {
    const opt = document.createElement('option');
    opt.value = label;
    opt.textContent = label.match(/^q\d+/i) ? label.toUpperCase() : label;
    sel.appendChild(opt);
  });
}

function getFilteredGroups() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const rule = document.getElementById('rule-filter').value;

  return allGroups.map(grp => {
    let issues = grp.issues;
    if (activeSevFilter === 'error')   issues = issues.filter(e => e.sev === 'error');
    if (activeSevFilter === 'warning') issues = issues.filter(e => e.sev === 'warning');
    if (activeSevFilter === 'issues')  issues = issues; // all issues, but only QCNs with issues (already in allGroups)
    if (activeSevFilter === 'clean')   return { qcn: grp.qcn, issues: [] }; // clean QCNs have no issues — handled below
    if (rule !== 'all') issues = issues.filter(e => e.qLabel === rule);
    if (q) issues = issues.filter(e =>
      `${grp.qcn} ${e.cols} ${e.msg} ${e.val} ${e.remarks} ${e.checkoder}`.toLowerCase().includes(q)
    );
    return { qcn: grp.qcn, issues };
  }).filter(grp => grp.issues.length > 0);
}

function renderTable() {
  filteredGroups = getFilteredGroups();
  currentPage = 1;
  renderPage();
}

function renderPage() {
  const total = filteredGroups.length;
  const totalIssues = filteredGroups.reduce((s, g) => s + g.issues.length, 0);
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filteredGroups.slice(start, start + PAGE_SIZE);

  document.getElementById('count-label').textContent =
    `${total.toLocaleString()} QCN${total !== 1 ? 's' : ''} · ${totalIssues.toLocaleString()} issue${totalIssues !== 1 ? 's' : ''}`;

  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');

  if (total === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    const rows = [];
    page.forEach((grp, gi) => {
      const errCount = grp.issues.filter(i => i.sev === 'error').length;
      const warnCount = grp.issues.filter(i => i.sev === 'warning').length;
      const badges = [
        errCount  ? `<span class="sev-error">✕ ${errCount} Error${errCount>1?'s':''}</span>` : '',
        warnCount ? `<span class="sev-warning">⚠ ${warnCount} Warning${warnCount>1?'s':''}</span>` : ''
      ].filter(Boolean).join(' ');

      grp.issues.forEach((issue, ii) => {
        const isFirst = ii === 0;
        const isLast  = ii === grp.issues.length - 1;
        const qcnCell = isFirst
          ? `<td class="col-qcn qcn-first${isLast?' qcn-last':''}" rowspan="${grp.issues.length}">
               <div class="qcn-val">${escHtml(grp.qcn)}</div>
               <div class="qcn-badges">${badges}</div>
             </td>`
          : '';
        const borderClass = isLast && gi < page.length - 1 ? ' row-group-end' : '';
        rows.push(`
          <tr class="issue-row${borderClass}">
            ${qcnCell}
            <td class="col-col">${escHtml(issue.cols)}</td>
            <td><span class="q-badge">${issue.qLabel.match(/^q\d+/i) ? issue.qLabel.toUpperCase() : issue.qLabel}</span></td>
            <td class="col-msg">${escHtml(issue.msg)}</td>
            <td><div class="col-val" title="${escHtml(issue.val)}">${escHtml(issue.val)||'<span style="color:var(--text-faint)">[empty]</span>'}</div></td>
            <td class="col-remarks">${issue.remarks ? escHtml(issue.remarks) : ''}</td>
            <td class="col-checkoder">${issue.checkoder ? escHtml(issue.checkoder) : ''}</td>
          </tr>`);
      });
    });
    tbody.innerHTML = rows.join('');
  }

  renderPagination(total);
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = `<span>Showing all ${total.toLocaleString()} QCN${total!==1?'s':''}</span><div></div>`; return; }

  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end = Math.min(currentPage * PAGE_SIZE, total);

  let btns = '';
  const range = [];
  for (let i = 1; i <= pages; i++) {
    if (i === 1 || i === pages || (i >= currentPage - 2 && i <= currentPage + 2)) range.push(i);
    else if (range[range.length-1] !== '…') range.push('…');
  }
  range.forEach(p => {
    if (p === '…') btns += `<span class="page-btn" style="cursor:default">…</span>`;
    else btns += `<button class="page-btn${p === currentPage ? ' active' : ''}" onclick="goPage(${p})">${p}</button>`;
  });

  el.innerHTML = `
    <span>Showing QCNs ${start}–${end} of ${total.toLocaleString()}</span>
    <div class="page-btns">
      <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Prev</button>
      ${btns}
      <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>Next →</button>
    </div>
  `;
}

function goPage(p) {
  const pages = Math.ceil(filteredGroups.length / PAGE_SIZE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  renderPage();
  document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth' });
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportCSV() {
  const data = [['QCN','Column(s)','Q#','Error Description','Actual Value','Remarks','Checkoder']];
  filteredGroups.forEach(grp => {
    grp.issues.forEach(e => data.push([grp.qcn, e.cols, e.qLabel.match(/^q\d+/i) ? e.qLabel.toUpperCase() : e.qLabel, e.msg, e.val, e.remarks || '', e.checkoder || '']));
  });
  const csv = data.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `quality_checker_errors_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
